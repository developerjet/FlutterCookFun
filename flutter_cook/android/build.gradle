buildscript {
    repositories {
        google()
        maven { url 'https://maven.aliyun.com/repository/google' }
        maven { url 'https://maven.aliyun.com/repository/public' }
        mavenCentral()
    }
}

allprojects {
    repositories {
        google()
        maven { url 'https://maven.aliyun.com/repository/google' }
        maven { url 'https://maven.aliyun.com/repository/public' }
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects { sub ->
    sub.buildDir = "${rootProject.buildDir}/${sub.name}"
    if (!sub.state.executed) {
        sub.afterEvaluate {
            if (hasProperty('android') && android.namespace == null) {
                android.namespace = group?.toString() ?: "com.missing.${name}"
            }
        }
    } else {
        // already evaluated — apply namespace fix immediately
        if (sub.hasProperty('android') && sub.android.namespace == null) {
            sub.android.namespace = sub.group?.toString() ?: "com.missing.${sub.name}"
        }
    }
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
