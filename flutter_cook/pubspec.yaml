name: flutter_cook
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  get: ^4.6.6                    # GetX — 路由、状态管理(.obs/Obx)、依赖注入、国际化

  # 网络
  dio: ^5.4.0                    # HTTP 客户端 — 拦截器、超时、错误处理
  webview_flutter: ^4.4.4       # WebView — 内嵌网页（设置页 Flutter.cn / GitHub 链接）

  # JSON 序列化
  json_annotation: ^4.11.0      # 注解 — @JsonSerializable 标记 Model，配合 build_runner 生成 .g.dart

  # UI 组件
  cupertino_icons: ^1.0.2       # iOS 风格图标
  carousel_slider: ^5.1.0       # 轮播图 — 首页 Banner
  easy_refresh: ^3.3.4          # 下拉刷新 + 上拉加载更多
  flutter_easyloading: ^3.0.5   # HUD 加载提示 / Toast
  photo_view: ^0.14.0           # 图片全屏预览 + 手势缩放（菜谱步骤图）
  visibility_detector: ^0.4.0+2 # 可见性检测 — 视频播放器自动暂停/恢复

  # 视频
  flick_video_player: ^0.7.0    # 视频播放器封装（基于 video_player）
  video_player: ^2.6.0          # Flutter 官方视频播放插件

  # 本地存储
  sqflite: ^2.3.2               # SQLite — 收藏数据持久化
  shared_preferences: ^2.2.2    # 键值对存储 — 主题模式、语言、搜索历史
  path_provider: ^2.1.5         # 文件系统路径 — 图片缓存、数据库路径
  gal: ^2.3.2                   # 相册保存 — 菜谱图片保存到系统相册
  path: ^1.8.4                  # 文件路径拼接工具

dependency_overrides:
  win32: ^5.15.0                # Windows 平台传递依赖版本锁定，仅影响 Windows 构建


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  json_serializable: ^6.13.1
  build_runner: ^2.13.1
  mocktail: ^1.0.5


flutter:
  uses-material-design: true
  
  #配置图片资源
  assets:
    - assets/images/
    - assets/bumble_bee_captions.srt

  #配置字体资源
  fonts:
   - family: Exo
     fonts:
      - asset: assets/fonts/Exo-Bold.ttf
      - asset: assets/fonts/Exo-Italic.ttf
      - asset: assets/fonts/Exo-Light.ttf
      - asset: assets/fonts/Exo-Medium.ttf
      - asset: assets/fonts/Exo-Regular.ttf
      - asset: assets/fonts/Exo-Thin.ttf
      